name: Build OLLVM Toolchain

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish the built/fetched toolchain artifacts under (e.g. toolchain-v1)'
        required: true

# The pinned commit lives in OLLVM_COMMIT, not a workflow input -- keeps a single
# canonical source of truth for "what are we building" instead of a duplicated
# default that can silently drift from the file.
jobs:
  linux_amd64:
    name: Build (linux_amd64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          df -h

      # ccache only survives within a single job's own processes -- each job
      # run gets a fresh runner VM, so without this the container's ccache
      # starts cold on every iteration of this (still being debugged)
      # workflow. Cache the host-side dir and bind-mount it into the
      # container, keyed on the pinned commit so a real content change still
      # gets a clean cache. Split restore/save (not the combined actions/cache
      # action) with `if: always()` on save -- the combined action skips
      # saving entirely whenever an earlier step fails, which cost us two
      # separate multi-hour cold Linux builds to unrelated bugs further down
      # this same script.
      - name: Restore ccache dir
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ollvm-ccache-linux_amd64-${{ hashFiles('OLLVM_COMMIT') }}
          restore-keys: ollvm-ccache-linux_amd64-

      - name: Build inside manylinux_2_28_x86_64
        run: |
          OLLVM_REF=$(cat OLLVM_COMMIT)
          mkdir -p out
          mkdir -p "${{ github.workspace }}/.ccache"
          docker run --rm -v "${{ github.workspace }}":/work -w /work -e CCACHE_DIR=/work/.ccache quay.io/pypa/manylinux_2_28_x86_64 bash -lc "
            set -euxo pipefail
            yum groupinstall -y 'Development Tools'
            yum install -y curl zip unzip tar autoconf libtool ccache python3 zstd wget jq git clang

            # manylinux_2_28's yum ninja-build package is too old (predates
            # depslog support for multiple-output build rules, which this
            # LLVM build needs) -- 'ninja: error: multiple outputs aren't
            # (yet?) supported by depslog'. A pip-based install pulled in an
            # ancient python3.6/pip9 stack via python3-pip's own dependencies
            # that couldn't build ninja's package at all -- use ninja's own
            # prebuilt static release binary instead, sidestepping Python
            # entirely.
            curl -sL -o /tmp/ninja.zip https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-linux.zip
            unzip -o /tmp/ninja.zip -d /usr/local/bin
            chmod +x /usr/local/bin/ninja
            ninja --version

            # Early smoke check -- LLVM 22 needs a reasonably modern C++17 host
            # compiler to bootstrap; fail loudly here rather than deep into a
            # multi-hour build if this image's GCC is too old.
            gcc --version
            g++ --version

            git clone --filter=blob:none https://github.com/maxdemarzi/ollvm.git llvm-src
            cd llvm-src
            git checkout '$OLLVM_REF'

            cmake -S llvm -B build -G Ninja \
              -DLLVM_ENABLE_PROJECTS='clang;lld' \
              -DLLVM_ENABLE_RTTI=ON \
              -DLLVM_ENABLE_EH=ON \
              -DLLVM_TARGETS_TO_BUILD='X86;AArch64' \
              -DLLVM_INCLUDE_TESTS=OFF -DLLVM_BUILD_TESTS=OFF \
              -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
              -DLLVM_ENABLE_ASSERTIONS=OFF \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DLLVM_PARALLEL_LINK_JOBS=1 \
              -DCMAKE_INSTALL_PREFIX=/work/install
            cmake --build build --parallel --target install clang lld opt
            ccache -s

            echo 'int main(void){return 0;}' > /tmp/t.c
            /work/install/bin/clang /tmp/t.c -o /tmp/t
            /tmp/t

            # ABI smoke check: this build must default to system libstdc++ (to
            # match GCC-built vcpkg static libs, e.g. highs), not libc++. Must
            # be a real compile+link (not -E, which stops before linking and
            # so never shows a linker invocation at all -- an earlier version
            # of this check always failed for that reason regardless of the
            # real default, since libcxx was never built here anyway).
            echo 'int main(void){return 0;}' > /tmp/t.cpp
            /work/install/bin/clang++ /tmp/t.cpp -o /tmp/t_cpp -v > /tmp/link.log 2>&1
            /tmp/t_cpp
            grep -q -- '-lstdc++' /tmp/link.log \
              && echo 'OK: defaults to libstdc++' \
              || (echo 'FAIL: does not default to libstdc++' && cat /tmp/link.log && exit 1)

            sh /work/wrapper/wrap_toolchain.sh /work/install

            # manylinux_2_28's tar predates the --zstd convenience flag --
            # use -I (--use-compress-program), a much older/more portable option.
            cd /work/install && tar -I zstd -cf /work/out/ollvm-clang-linux_amd64.tar.zst .
          "

      - name: Save ccache dir
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ollvm-ccache-linux_amd64-${{ hashFiles('OLLVM_COMMIT') }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ollvm-clang-linux_amd64
          path: out/ollvm-clang-linux_amd64.tar.zst
          retention-days: 7
          if-no-files-found: error

  linux_arm64:
    name: Build (linux_arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          df -h

      - name: Restore ccache dir
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ollvm-ccache-linux_arm64-${{ hashFiles('OLLVM_COMMIT') }}
          restore-keys: ollvm-ccache-linux_arm64-

      - name: Build inside manylinux_2_28_aarch64
        run: |
          OLLVM_REF=$(cat OLLVM_COMMIT)
          mkdir -p out
          mkdir -p "${{ github.workspace }}/.ccache"
          docker run --rm -v "${{ github.workspace }}":/work -w /work -e CCACHE_DIR=/work/.ccache quay.io/pypa/manylinux_2_28_aarch64 bash -lc "
            set -euxo pipefail
            yum groupinstall -y 'Development Tools'
            yum install -y curl zip unzip tar autoconf libtool ccache python3 zstd wget jq git clang

            # manylinux_2_28's yum ninja-build package is too old (predates
            # depslog support for multiple-output build rules, which this
            # LLVM build needs) -- 'ninja: error: multiple outputs aren't
            # (yet?) supported by depslog'. A pip-based install pulled in an
            # ancient python3.6/pip9 stack via python3-pip's own dependencies
            # that couldn't build ninja's package at all -- use ninja's own
            # prebuilt static release binary instead, sidestepping Python
            # entirely.
            curl -sL -o /tmp/ninja.zip https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-linux-aarch64.zip
            unzip -o /tmp/ninja.zip -d /usr/local/bin
            chmod +x /usr/local/bin/ninja
            ninja --version

            gcc --version
            g++ --version

            git clone --filter=blob:none https://github.com/maxdemarzi/ollvm.git llvm-src
            cd llvm-src
            git checkout '$OLLVM_REF'

            cmake -S llvm -B build -G Ninja \
              -DLLVM_ENABLE_PROJECTS='clang;lld' \
              -DLLVM_ENABLE_RTTI=ON \
              -DLLVM_ENABLE_EH=ON \
              -DLLVM_TARGETS_TO_BUILD='X86;AArch64' \
              -DLLVM_INCLUDE_TESTS=OFF -DLLVM_BUILD_TESTS=OFF \
              -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
              -DLLVM_ENABLE_ASSERTIONS=OFF \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DLLVM_PARALLEL_LINK_JOBS=1 \
              -DCMAKE_INSTALL_PREFIX=/work/install
            cmake --build build --parallel --target install clang lld opt
            ccache -s

            echo 'int main(void){return 0;}' > /tmp/t.c
            /work/install/bin/clang /tmp/t.c -o /tmp/t
            /tmp/t

            # See the linux_amd64 job for why this must be a real compile+link
            # rather than -E, which never shows a linker invocation at all.
            echo 'int main(void){return 0;}' > /tmp/t.cpp
            /work/install/bin/clang++ /tmp/t.cpp -o /tmp/t_cpp -v > /tmp/link.log 2>&1
            /tmp/t_cpp
            grep -q -- '-lstdc++' /tmp/link.log \
              && echo 'OK: defaults to libstdc++' \
              || (echo 'FAIL: does not default to libstdc++' && cat /tmp/link.log && exit 1)

            sh /work/wrapper/wrap_toolchain.sh /work/install

            # See linux_amd64 for why -I zstd, not --zstd.
            cd /work/install && tar -I zstd -cf /work/out/ollvm-clang-linux_arm64.tar.zst .
          "

      - name: Save ccache dir
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ollvm-ccache-linux_arm64-${{ hashFiles('OLLVM_COMMIT') }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ollvm-clang-linux_arm64
          path: out/ollvm-clang-linux_arm64.tar.zst
          retention-days: 7
          if-no-files-found: error

  macos_universal:
    name: Build (osx_amd64 + osx_arm64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install deps
        run: brew install ninja ccache zstd

      - name: Cache ccache dir
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ollvm-ccache-osx_universal-${{ hashFiles('OLLVM_COMMIT') }}
          max-size: 5G

      - name: Build ollvm (X86 + AArch64 backends, one toolchain for both targets)
        run: |
          OLLVM_REF=$(cat OLLVM_COMMIT)
          git clone --filter=blob:none https://github.com/maxdemarzi/ollvm.git llvm-src
          cd llvm-src
          git checkout "$OLLVM_REF"

          # A self-built clang has no default sysroot -- unlike Apple's own
          # clang wrapper, it won't auto-discover the Xcode SDK, so plain
          # `clang foo.c -o foo` fails to link with "library 'System' not
          # found". Bake the SDK path in at build time (DEFAULT_SYSROOT) so
          # every downstream consumer of this toolchain (including Swan's own
          # build later) doesn't need special -isysroot handling.
          SDKROOT_PATH=$(xcrun --show-sdk-path)
          echo "Using SDK: $SDKROOT_PATH"

          # Bundle our own statically-linked libc++/libc++abi instead of
          # relying on whatever SDK/system libc++.dylib happens to be active
          # wherever this toolchain gets used. Without this, a vanilla
          # upstream (non-Apple-patched) clang targeting an old
          # -mmacosx-version-min against a newer SDK can hit a genuine,
          # deterministic ABI mismatch -- confirmed via a real CI failure:
          # undefined `std::length_error::length_error[abi:ne190102]` linking
          # swan_extension.cpp.o against Xcode 16.4's SDK/system libc++.
          # LIBCXX_ENABLE_VENDOR_AVAILABILITY_ANNOTATIONS (default OFF) is
          # exactly the mechanism that ties symbols to OS-version-gated
          # availability -- bundling our own means we never depend on it.
          # LIBCXX(ABI)_HERMETIC_STATIC_LIBRARY is deliberately OFF (not the
          # LLVM default recommendation for a bundled static libc++): hermetic
          # mode gives every one of its symbols hidden visibility so multiple
          # unrelated static-libc++ consumers linked into the same process
          # never clash -- but that hiding also applies to exception RTTI
          # (typeinfo for std::exception/std::runtime_error/etc.), and Itanium
          # C++ ABI cross-DSO exception matching requires that RTTI to be
          # exported/mergeable. Confirmed via a direct repro: a hidden-
          # visibility .dylib throwing std::runtime_error, caught by a
          # separate binary, silently fails to match `catch (const
          # std::exception&)` and falls through to `catch (...)` -- exactly
          # what happened for every exception swan.duckdb_extension threw
          # into DuckDB's own pipeline/task-scheduling code (which is a
          # SEPARATE binary/process from the extension .dylib, i.e. exactly
          # the boundary this crosses). Non-hermetic keeps the static
          # linkage (still no runtime libc++.dylib version dependency) but
          # leaves its exported symbols visible/mergeable, matching what a
          # normal (non-hermetic) static libc++ build does -- and since swan
          # is this toolchain's only real consumer, there's no known
          # multi-consumer symbol-clash risk from turning hermetic off.
          # LIBCXXABI_USE_LLVM_UNWINDER=OFF: Darwin has its own native
          # unwinder in libSystem; libcxxabi's CMakeLists hard-fails if this
          # is ON without libunwind also in LLVM_ENABLE_RUNTIMES.
          # CMAKE_OSX_ARCHITECTURES isn't forwarded into the runtimes
          # sub-build automatically (confirmed via llvm/runtimes/CMakeLists.txt),
          # hence the explicit RUNTIMES_CMAKE_ARGS pass-through, matching
          # duckdb's own -mmacosx-version-min=11.0.
          cmake -S llvm -B build -G Ninja \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi" \
            -DLIBCXX_ENABLE_SHARED=OFF \
            -DLIBCXX_ENABLE_STATIC=ON \
            -DLIBCXX_ENABLE_STATIC_ABI_LIBRARY=ON \
            -DLIBCXX_HERMETIC_STATIC_LIBRARY=OFF \
            -DLIBCXXABI_ENABLE_SHARED=OFF \
            -DLIBCXXABI_ENABLE_STATIC=ON \
            -DLIBCXXABI_HERMETIC_STATIC_LIBRARY=OFF \
            -DLIBCXXABI_USE_LLVM_UNWINDER=OFF \
            -DRUNTIMES_CMAKE_ARGS="-DCMAKE_OSX_ARCHITECTURES=arm64\;x86_64;-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0" \
            -DLLVM_ENABLE_RTTI=ON \
            -DLLVM_ENABLE_EH=ON \
            -DLLVM_TARGETS_TO_BUILD="X86;AArch64" \
            -DLLVM_INCLUDE_TESTS=OFF -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DDEFAULT_SYSROOT="$SDKROOT_PATH" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          cmake --build build --parallel --target install clang lld opt
          ccache -s

          # RUNTIMES_CMAKE_ARGS's CMAKE_OSX_ARCHITECTURES=arm64;x86_64 above
          # does NOT actually produce a universal static libc++.a/libc++abi.a
          # -- confirmed via a real CI failure (osx_amd64's build linking
          # swan's own extension warned "found architecture arm64, required
          # architecture x86_64" for every object in both archives; lipo -info
          # on the published release asset independently confirmed they're
          # arm64-only). The clang/opt/lld COMPILER binaries are unaffected
          # by this -- they're native-arch tools that already correctly
          # support code generation for both -arch arm64 and -arch x86_64
          # (confirmed: highs's own x86_64 compile succeeded against this
          # same clang) -- it's specifically the pre-built runtime archives
          # that come out single-arch from the monolithic Ninja build above.
          # Rather than debug why the implicit runtimes sub-build's
          # multi-arch pass-through silently drops x86_64, build libcxx and
          # libcxxabi a second time, standalone, explicitly for x86_64 only
          # (llvm-project's own supported "build runtimes against an existing
          # clang" entry point, <llvm-src>/runtimes), reusing the
          # already-built compiler -- then lipo -create merge the two
          # per-arch archives into genuinely universal ones in the final
          # install tree.
          cmake -S llvm-src/runtimes -B build-libcxx-x86_64 -G Ninja \
            -DCMAKE_C_COMPILER="${{ github.workspace }}/install/bin/clang" \
            -DCMAKE_CXX_COMPILER="${{ github.workspace }}/install/bin/clang++" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi" \
            -DLIBCXX_ENABLE_SHARED=OFF \
            -DLIBCXX_ENABLE_STATIC=ON \
            -DLIBCXX_ENABLE_STATIC_ABI_LIBRARY=ON \
            -DLIBCXX_HERMETIC_STATIC_LIBRARY=OFF \
            -DLIBCXXABI_ENABLE_SHARED=OFF \
            -DLIBCXXABI_ENABLE_STATIC=ON \
            -DLIBCXXABI_HERMETIC_STATIC_LIBRARY=OFF \
            -DLIBCXXABI_USE_LLVM_UNWINDER=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install-x86_64"
          cmake --build build-libcxx-x86_64 --parallel --target install
          ccache -s

          for lib in libc++.a libc++abi.a; do
            arm64_lib="${{ github.workspace }}/install/lib/$lib"
            x86_64_lib="${{ github.workspace }}/install-x86_64/lib/$lib"
            if [ ! -f "$x86_64_lib" ]; then
              echo "FAIL: expected standalone x86_64 runtimes build to produce $x86_64_lib"
              find "${{ github.workspace }}/install-x86_64" -name "$lib"
              exit 1
            fi
            lipo -info "$arm64_lib" "$x86_64_lib"
            lipo -create "$arm64_lib" "$x86_64_lib" -output "$arm64_lib.universal"
            mv "$arm64_lib.universal" "$arm64_lib"
            lipo -info "$arm64_lib"
          done

          # The Darwin clang driver auto-discovers bundled libc++ *headers*
          # via <clang-bin>/../include/c++/v1 with no flags needed, but it
          # never adds <clang-bin>/../lib to the linker's search path (unlike
          # every other clang toolchain) -- so `-lc++` would still silently
          # resolve against the ambient SDK/system dylib without this. A
          # default config file (auto-loaded from the executable's own
          # directory, see clang/docs/UsersManual.md "Configuration files")
          # is the documented fix. Named to match wrap_toolchain.sh's
          # clang.real/clang++.real rename (that script renames these
          # .cfg files alongside the binaries) so this keeps working after
          # the wrapper is bundled in.
          echo "-L <CFGDIR>/../lib" > "${{ github.workspace }}/install/bin/clang.cfg"
          echo "-L <CFGDIR>/../lib" > "${{ github.workspace }}/install/bin/clang++.cfg"

          echo 'int main(void){return 0;}' > /tmp/t.c
          "${{ github.workspace }}/install/bin/clang" -arch arm64 /tmp/t.c -o /tmp/t_arm64
          "${{ github.workspace }}/install/bin/clang" -arch x86_64 /tmp/t.c -o /tmp/t_x86_64
          /tmp/t_arm64

          # Confirm libc++/libc++abi are statically linked in, not resolved
          # against the system dylib (the exact bug being fixed here).
          echo '#include <stdexcept>' > /tmp/t2.cpp
          echo 'int main(void){ try { throw std::length_error("x"); } catch (const std::length_error&) { return 0; } return 1; }' >> /tmp/t2.cpp
          "${{ github.workspace }}/install/bin/clang++" -arch arm64 -mmacosx-version-min=11.0 /tmp/t2.cpp -o /tmp/t2_arm64
          /tmp/t2_arm64
          if otool -L /tmp/t2_arm64 | grep -qi 'libc++'; then
            echo "FAIL: still dynamically linked against a system libc++"
            otool -L /tmp/t2_arm64
            exit 1
          fi
          echo "OK: statically linked, no libc++ dylib dependency (arm64)"

          # x86_64 counterpart of the same check -- this is exactly what the
          # lipo merge above exists to fix, so a compile+link failure here
          # means that merge didn't actually produce a working universal
          # archive. Can't execute the resulting binary directly on this
          # arm64 runner (no Rosetta guaranteed), so this only proves
          # link-time correctness, not the exception actually unwinding --
          # the arm64 run above already covers that behavior.
          "${{ github.workspace }}/install/bin/clang++" -arch x86_64 -mmacosx-version-min=11.0 /tmp/t2.cpp -o /tmp/t2_x86_64
          if otool -L /tmp/t2_x86_64 | grep -qi 'libc++'; then
            echo "FAIL: still dynamically linked against a system libc++"
            otool -L /tmp/t2_x86_64
            exit 1
          fi
          echo "OK: statically linked, no libc++ dylib dependency (x86_64)"

          sh "${{ github.workspace }}/wrapper/wrap_toolchain.sh" "${{ github.workspace }}/install"

          mkdir -p "${{ github.workspace }}/out"
          cd "${{ github.workspace }}/install" && tar --zstd -cf "${{ github.workspace }}/out/ollvm-clang-osx_universal.tar.zst" .

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ollvm-clang-osx_universal
          path: out/ollvm-clang-osx_universal.tar.zst
          retention-days: 7
          if-no-files-found: error

  windows_fetch:
    name: Fetch upstream prebuilt (windows_amd64)
    runs-on: ubuntu-24.04
    steps:
      # NOTE: und3ath/ollvm's actual release-producing workflow (ollvm-build.yml)
      # does not call actions/attest-build-provenance -- that permission only
      # exists in a different, inherited-from-upstream-LLVM workflow
      # (release-binaries-all.yml) that is NOT what builds these specific
      # assets. `gh attestation verify` correctly reports "no attestations
      # found" for them; don't call it here. Our own provenance guarantee
      # instead comes from: (a) pinning to an explicit release tag, never
      # `latest`, matching the same commit as OLLVM_COMMIT, and (b) the
      # `publish` job's own actions/attest-build-provenance on everything we
      # re-publish from this repo.
      - name: Download upstream release asset (pinned tag, not latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p out
          gh release download v0.5.0 --repo und3ath/ollvm --pattern 'ollvm22-windows-Release.7z' --dir out
          sha256sum out/ollvm22-windows-Release.7z

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ollvm-clang-windows_amd64
          path: out/ollvm22-windows-Release.7z
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish release
    needs: [linux_amd64, linux_arm64, macos_universal, windows_fetch]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Re-enabled now that this repo is public -- actions/attest-build-provenance
      # previously failed here with "Feature not available for user-owned
      # private repositories" (a GitHub platform limitation on private
      # user-owned repos, not fixable in the workflow). toolchain-v1 itself
      # was published manually before this was public, so it has no
      # attestation; this covers every release from here on.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: artifacts/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: artifacts/*
          draft: false
